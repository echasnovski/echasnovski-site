project:
  type: website
  output-dir: docs

website:
  title: Evgeni Chasnovski
  favicon: assets/EC2_256x256.png
  description: 'Personal website of Evgeni Chasnovski'
  site-url: https://echasnovski.com
  repo-url: https://github.com/echasnovski/echasnovski-site

  open-graph:
    site-name: "Evgeni Chasnovski"
    locale: en_US
    image: /assets/EC2-social.png
  twitter-card:
    creator: "@echasnovski"
    image: /assets/EC2-social.png

  navbar:
    search: true
    left:
      - href: projects.qmd
        text: Projects
      - href: blog.qmd
        text: Blog
      - href: talks.qmd
        text: Talks
    right:
      - icon: github
        href: https://github.com/echasnovski
      - icon: bluesky
        href: https://bsky.app/profile/echasnovski.com
      - icon: youtube
        href: https://www.youtube.com/@echasnovski
      - icon: rss-fill
        href: blog.xml
        aria-label: RSS

  page-footer:
    center: "© Evgeni Chasnovski, [CC BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0/)"

  draft-mode: unlinked

format:
  html:
    theme:
      dark:
        - brand
        - theme/styles.scss
      light:
        - brand
        - theme/styles.scss
    toc: true
    respect-user-color-scheme: true
    code-overflow: scroll
    highlight-style:
      dark: theme/seabed-dark.theme
      light: theme/seabed-light.theme
    include-after-body: assets/traffic-counter.html

brand:
  dark: theme/brand-dark.yml
  light: theme/brand-light.yml

execute:
  freeze: true
